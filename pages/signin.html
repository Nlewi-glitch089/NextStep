<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for proper rendering -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextStep - Sign In</title>
    
    <!-- Stylesheet Links -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <!-- Header Section with Navigation -->
    <header class="header">
        <nav class="nav">
            <!-- Logo with home page link -->
            <a href="../index.html" class="logo">NextStep</a>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="container">
        <!-- Authentication Form Container -->
        <div class="auth-form">
            <!-- Form Header -->
            <h2 class="section-title">Welcome Back</h2>
            
            <!-- Sign In Form -->
            <form onsubmit="handleSignIn(event)" id="signin-form">
                <!-- Email Input -->
                <input type="email" 
                       class="input-field" 
                       id="email" 
                       placeholder="Email" 
                       required>
                
                <!-- Password Input -->
                <input type="password" 
                       class="input-field" 
                       id="password" 
                       placeholder="Password" 
                       required>
                
                <!-- Submit Button -->
                <button type="submit" class="cta-button">Sign In</button>
            </form>
            
            <!-- Sign Up Link -->
            <p>New to NextStep? <a href="signup.html">Create Account</a></p>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="../scripts/signin.js"></script>
</body>
</html>
